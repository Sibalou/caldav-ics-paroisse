name: Sync CalDAV → ICS

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync
        env:
          CALDAV_URL:       ${{ secrets.CALDAV_URL }}
          CALDAV_USER:      ${{ secrets.CALDAV_USER }}
          CALDAV_PASSWORD:  ${{ secrets.CALDAV_PASSWORD }}
          CALDAV_CALENDARS: ${{ secrets.CALDAV_CALENDARS }}
          FILTER_KEYWORD:   "#interne"
          OUTPUT_FILENAME:  "calendrier.ics"
          CALENDAR_NAME:    ${{ secrets.CALENDAR_NAME }}
        run: python caldav_sync.py

      - name: Deploy ICS to gh-pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp calendrier.ics /tmp/calendrier.ics
          git fetch origin
          if git rev-parse --verify origin/gh-pages > /dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
          fi
          cp /tmp/calendrier.ics calendrier.ics
          touch .nojekyll
          cat > index.html << 'HTML'
<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<meta http-equiv="refresh" content="0; url=https://saintemariedespeuples.org">
<title>Redirection...</title>
</head>
<body></body>
</html>
HTML
          git add calendrier.ics .nojekyll index.html
          git diff --cached --quiet || git commit -m "chore: sync CalDAV [$(date -u '+%Y-%m-%d %H:%M')] UTC"
          git push origin gh-pages
